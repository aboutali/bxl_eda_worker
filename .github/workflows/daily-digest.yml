name: daily-digest

on:
  schedule:
    # 06:00 UTC every day = 07:00 CET / 08:00 CEST
    - cron: "0 6 * * *"
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Persist the SQLite dedup store across runs so the daily digest is a
      # true 24h delta rather than "everything currently in the RSS feeds".
      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: data/
          key: items-db-${{ github.run_id }}
          restore-keys: |
            items-db-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[headless,llm]"

      # Pin the Playwright browser cache to the installed Playwright version.
      # An unversioned key let an old chromium binary survive a Playwright
      # upgrade, which then failed at launch with "Executable doesn't exist".
      - name: Resolve Playwright version
        id: pw-version
        run: echo "version=$(python -c 'import playwright, sys; sys.stdout.write(playwright.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ steps.pw-version.outputs.version }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run worker
        env:
          # Optional. If unset, the worker logs a warning and falls back to the
          # keyword classifier — site still builds.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m bxl_eda_worker run

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily digest: $(date -u +%Y-%m-%d)"
          git push
