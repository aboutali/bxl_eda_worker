name: seed-archive

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate weeks even if they already exist"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: seed-archive
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm]"

      - name: Seed weekly archive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret is not set"
            exit 1
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m bxl_eda_worker seed-archive --force
          else
            python -m bxl_eda_worker seed-archive
          fi

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes — already seeded."
            exit 0
          fi
          git commit -m "Seed weekly archive (workflow_dispatch)"
          git push
