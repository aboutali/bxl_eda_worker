# Source list for bxl_eda_worker.
# Verified state as of 2026-04. Edit URLs freely — no validation until fetch time.
#
# fields:
#   id              short stable identifier
#   name            display name in digest
#   type            "rss" | "eeas_html" | "headless_html"
#   url             fetch URL
#   category        "eu_institution" | "swiss_official" | "press_eu"
#                   | "press_swiss" | "press_intl" | "think_tank"
#   weight          1=low, 3=high; primary sources rank above secondary in digest
#   language        "en" | "de" | "fr" | "it"
#   selector        CSS selector for headless_html (anchor selector)
#   title_selector  optional CSS selector evaluated *inside* each anchor to get a clean title
#   badge           optional short tag shown next to source name

# ─────────────────────────────────────────────────────────────────────────────
# EU INSTITUTIONS — primary sources
# ─────────────────────────────────────────────────────────────────────────────

[[sources]]
id = "eeas_press"
name = "EEAS — Press Material"
type = "eeas_html"
url = "https://www.eeas.europa.eu/eeas/press-material_en"
category = "eu_institution"
weight = 3
language = "en"

[[sources]]
id = "council_press"
name = "Council of the EU — Press Releases"
type = "headless_html"
url = "https://www.consilium.europa.eu/en/press/press-releases/"
category = "eu_institution"
weight = 3
language = "en"
selector = "a.gsc-excerpt-item__link"
title_selector = ".gsc-excerpt-item__title"
badge = "FAC"

# council_meetings (FAC calendar) is disabled: the page renders items via
# deferred XHRs that don't settle within our 30s timeout. Press releases above
# already carry FAC outcomes; the calendar is "when's the next FAC", which is
# secondary signal. Re-enable once a faster selector path is found.
