# Source list for bxl_eda_worker.
# Edit URLs freely — they are not validated until fetch time.
# `type` is one of: "rss", "eeas_html".
# Verified state as of 2026-04.

[[sources]]
id = "eeas_press"
name = "EEAS Press Material"
type = "eeas_html"
url = "https://www.eeas.europa.eu/eeas/press-material_en"
weight = 3
# EEAS retired its public RSS; we scrape the press-material listing page.
# Per-item dates are not exposed in the listing, so first-seen wins.

[[sources]]
id = "ep_news"
name = "European Parliament — News"
type = "rss"
url = "https://www.europarl.europa.eu/rss/doc/top-stories/en.xml"
weight = 2

[[sources]]
id = "ep_afet"
name = "European Parliament — AFET Committee"
type = "rss"
url = "https://www.europarl.europa.eu/rss/committee/afet/en.xml"
weight = 2

[[sources]]
id = "politico_eu"
name = "Politico Europe"
type = "rss"
url = "https://www.politico.eu/feed/"
weight = 2

[[sources]]
id = "commission_press"
name = "European Commission — Press Corner"
type = "rss"
url = "https://ec.europa.eu/commission/presscorner/api/rss?language=en"
weight = 2

